terms:
  perceptron: "A single neural-network unit computing sigma(w . x + b)."
  activation function: "The elementwise nonlinearity applied after each layer's linear map (sigmoid, ReLU, tanh, GELU, ...)."
  hidden layer: "A layer of neurons between the input and the output, producing an intermediate representation."
  forward pass: "Computing the network's output from inputs by walking each layer in order."
  backward pass: "Computing each parameter's gradient by walking each layer in reverse, applying the chain rule."
  backpropagation: "The algorithm that performs the backward pass efficiently."
  loss function: "A scalar measure of how wrong the network's predictions are."
  cross-entropy: "Standard classification loss; for one-hot label y and predicted distribution y_hat, L = -sum_i y_i log y_hat_i."
  gradient descent: "An optimizer that updates parameters in the direction opposite to the loss gradient."
  learning rate: "The scalar step size for gradient descent."
  epoch: "One full pass of the training data through the optimizer."
  batch: "A subset of training examples whose gradients are averaged before each update."
  overfitting: "When a model fits training data well but generalizes poorly to new data."
